[package]
name = "zk-covenant-rollup-tui"
version = "0.1.0"
edition = "2021"

[workspace]

[features]
cuda = ["zk-covenant-rollup-host/cuda", "risc0-zkvm/cuda"]

[dependencies]
zk-covenant-rollup-host = { path = "../host" }
zk-covenant-rollup-core = { path = "../core", features = ["std"] }
zk-covenant-common = { path = "../../zk-covenant-common" }
zk-covenant-rollup-methods = { path = "../methods" }

risc0-zkvm = { version = "3.0.5", default-features = true }

kaspa-consensus-core = { path = "../../../consensus/core" }
kaspa-hashes = { path = "../../../crypto/hashes" }
kaspa-addresses = { path = "../../../crypto/addresses" }
kaspa-wrpc-client = { path = "../../../rpc/wrpc/client" }
kaspa-rpc-core = { path = "../../../rpc/core" }
kaspa-notify = { path = "../../../notify" }
kaspa-txscript = { path = "../../../crypto/txscript" }
kaspa-merkle = { path = "../../../crypto/merkle" }

borsh = { version = "1.6.0", features = ["derive"] }
bytemuck = "1.24.0"
rocksdb = "0.24"
ratatui = "0.29"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
futures = "0.3"
workflow-core = "0.18.0"
workflow-log = "0.18.0"
faster-hex = "0.10.0"
ctrlc = "3.4.1"
anyhow = "1"
secp256k1 = { version = "0.29.0", features = ["global-context", "rand-std"] }
rand = "0.8.5"
arboard = "3"
open = "5"

[dev-dependencies]
tempfile = "3"
kaspa-testing-integration = { path = "../../../testing/integration" }
kaspad = { path = "../../../kaspad" }
kaspa-core = { path = "../../../core" }
kaspa-consensus = { path = "../../../consensus" }
kaspa-grpc-client = { path = "../../../rpc/grpc/client" }

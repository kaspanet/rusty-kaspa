<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./resources/style.css" />
    <script type="importmap">
      { "imports": { "kaspa": "../../web/kaspa-rpc/kaspa.js" } }
    </script>
    <script type="module">
      import { log, currentNetwork } from "./resources/utils.js";
      import init, { Resolver, RpcClient } from "kaspa";

      await init(); // load the WASM32 SDK binaries

      const networkId = currentNetwork();
      log(`Connecting to ${networkId.class("network")}...`);

      const rpc = new RpcClient({ resolver: new Resolver(), networkId });
      await rpc.connect();
      log("Connected to", rpc.url.class("network"));

      log("getServerInfo request...");
      log("getServerInfo response:", await rpc.getServerInfo());

      await rpc.disconnect();
      log("Disconnected.");
    </script>
  </head>
  <body></body>
</html>

<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./resources/style.css" />
    <script type="importmap">
      { "imports": { "kaspa": "../../web/kaspa-keygen/kaspa.js" } }
    </script>
    <script type="module">
      import init, {
        PublicKeyGenerator,
        NetworkType,
        Mnemonic,
        XPrv,
      } from "kaspa";

      await init(); // loads kaspa_bg.wasm next to kaspa.js

      const out = (label, value) => {
        const li = document.createElement("li");
        li.textContent = `${label}: ${value}`;
        document.getElementById("out").appendChild(li);
      };

      // Derive an xpub from a random master key, then the first receive addresses.
      const xprv = new XPrv(Mnemonic.random().toSeed()).intoString("kprv");
      const xpub = await PublicKeyGenerator.fromMasterXPrv(xprv, false, 0n);

      const keys = await xpub.receivePubkeys(0, 5);
      const addresses = keys.map((key) =>
        key.toAddress(NetworkType.Testnet).toString(),
      );

      // Restoring the xpub from its string must reproduce the same addresses.
      const restored = await PublicKeyGenerator.fromXPub(xpub.toString());
      const restoredAddresses = (await restored.receivePubkeys(0, 5)).map(
        (key) => key.toAddress(NetworkType.Testnet).toString(),
      );

      const ok = addresses.every((a, i) => a === restoredAddresses[i]);
      out("xpub restore", ok ? "success" : "FAILED");
      addresses.forEach((a, i) => out(`receive[${i}]`, a));
    </script>
  </head>
  <body>
    <a href="index.html">&larr; Back</a>
    <h3>XPub derivation &amp; restore (testnet)</h3>
    <ul id="out"></ul>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./resources/style.css" />
    <script type="importmap">
      { "imports": { "kaspa": "../../web/kaspa/kaspa.js" } }
    </script>
    <script type="module">
      import { log } from "./resources/utils.js";
      import init from "kaspa";

      await init(); // load the WASM32 SDK binaries

      // `discover_kaspa_wallet()` is injected into the page by installed Kaspa
      // wallet browser extensions — it is not part of the SDK, so guard against
      // it being absent when no compatible wallet is installed.
      const discoverWallets = () =>
        typeof discover_kaspa_wallet === "function"
          ? discover_kaspa_wallet()
          : [];

      const list = document.getElementById("wallets");
      const connect = document.getElementById("connect");

      connect.addEventListener("click", () => {
        const wallets = discoverWallets();
        if (!wallets.length) {
          log("No Kaspa wallet extension detected.");
          return;
        }

        list.replaceChildren();
        const template = document.getElementById("wallet-tpl");
        for (const wallet of wallets) {
          const card = template.content.cloneNode(true);
          card.querySelector(".title").textContent = wallet.name;
          card.querySelector(".icon").src = wallet.icon;
          card.querySelector(".wallet").dataset.uuid = wallet.uuid;
          list.appendChild(card);
        }
        connect.disabled = true;
      });

      list.addEventListener("click", async (e) => {
        const uuid = e.target.closest(".wallet")?.dataset.uuid;
        if (!uuid) return;

        const wallet = discoverWallets().find((w) => w.uuid === uuid);
        if (!wallet?.api) return;

        const result = await wallet.api.connect();
        log(`Connected to ${wallet.name}:`, result);
      });
    </script>
  </head>
  <body>
    <button id="connect" class="link">Connect wallet</button>
    <div id="wallets"></div>

    <template id="wallet-tpl">
      <div class="wallet">
        <img class="icon" width="50" height="50" />
        <h2 class="title"></h2>
      </div>
    </template>
  </body>
</html>

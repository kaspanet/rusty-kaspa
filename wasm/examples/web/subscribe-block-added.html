<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./resources/style.css" />
    <script type="importmap">
      { "imports": { "kaspa": "../../web/kaspa-rpc/kaspa.js" } }
    </script>
    <script type="module">
      import {
        log,
        logToId,
        clearId,
        randomId,
        currentNetwork,
        disconnectHandler,
      } from "./resources/utils.js";
      import init, { Resolver, RpcClient } from "kaspa";

      await init(); // load the WASM32 SDK binaries

      const networkId = currentNetwork();
      const rpc = new RpcClient({ resolver: new Resolver(), networkId });

      // (Re)subscribe on every connect, streaming blocks into a fresh log line.
      let id;
      rpc.addEventListener("connect", async () => {
        clearId(id);
        id = randomId();
        log("Connected to", rpc.url.class("network"));
        log("Subscribing to block-added notifications...");
        await rpc.subscribeBlockAdded();
      });

      rpc.addEventListener("disconnect", () => {
        log("Disconnected from", rpc.url.class("network"));
      });

      rpc.addEventListener("block-added", (event) => {
        // Drop parentsByLevel to keep the rendered output compact.
        delete event.data.block.header.parentsByLevel;
        logToId(id, event);
      });

      log(`Connecting to ${networkId.class("network")}...`);
      await rpc.connect();

      disconnectHandler(rpc);
    </script>
  </head>
  <body></body>
</html>

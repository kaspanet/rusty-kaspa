<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./resources/style.css" />
    <script type="importmap">
      { "imports": { "kaspa": "../../web/kaspa-core/kaspa.js" } }
    </script>
    <script type="module">
      import { log, currentNetwork } from "./resources/utils.js";
      import init, { Resolver, UtxoProcessor, UtxoContext } from "kaspa";

      await init(); // load the WASM32 SDK binaries

      const networkId = currentNetwork();
      log(`Connecting to ${networkId.class("network")}...`);

      const rpc = await new Resolver().connect(networkId);
      log("Connected to", rpc.url.class("network"));

      // A UtxoProcessor streams UTXO changes for the addresses tracked by its
      // contexts; here we just count and log every event it emits.
      const processor = new UtxoProcessor({ rpc, networkId });
      await processor.start();
      const context = new UtxoContext({ processor });

      let events = 0;
      processor.addEventListener((event) => {
        document.getElementById("actions").innerHTML =
          `| Received ${++events} event(s)`;
        log("event:", event);
      });

      log("");
      log(
        "This demo is for manual testing of the events emitted by the UtxoProcessor.",
      );
      log(
        "Some addresses hold thousands of UTXOs, which a browser cannot render as a",
      );
      log("flat list — real applications should paginate this output.");

      const el = document.createElement("div");
      el.innerHTML = `
        <br /><input id="address" class="address" type="text" placeholder=" Enter ${networkId} address..." />
        <br />&nbsp;<br />
        <div id="track" class="link">Track address</div>
        <br />&nbsp;<br />
        <div id="restart" class="link">Restart</div>
      `;
      document.body.appendChild(el);

      document.getElementById("track").addEventListener("click", async () => {
        const input = document.getElementById("address");
        const address = input.value.trim();
        if (!address) return;
        log("Tracking address:", address);
        try {
          await context.trackAddresses([address]);
        } catch (e) {
          log("Error:", e);
        }
        input.value = "";
      });

      document.getElementById("restart").addEventListener("click", async () => {
        log("Restarting processor...");
        await context.clear();
        await processor.stop();
        await processor.start();
        log("Processor restarted.");
      });
    </script>
  </head>
  <body></body>
</html>

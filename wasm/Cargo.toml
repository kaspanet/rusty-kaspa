[package]
name = "kaspa-wasm"
description = "KASPA WASM bindings"
rust-version.workspace = true
version.workspace = true
edition.workspace = true
authors.workspace = true
include.workspace = true
repository.workspace = true
# wasm-pack requires this value to be a string
# (it can not be derived from the workspace)
license = "ISC"

[lib]
crate-type = ["cdylib"]

[dependencies]
cfg-if.workspace = true
js-sys.workspace = true
kaspa-addresses.workspace = true
kaspa-bip32.workspace = true
kaspa-consensus-core.workspace = true
kaspa-consensus-wasm.workspace = true
kaspa-core.workspace = true
kaspa-math.workspace = true
kaspa-pow.workspace = true
kaspa-txscript.workspace = true
kaspa-txscript-zk-sdk.workspace = true
kaspa-rpc-core.workspace = true
kaspa-utils.workspace = true
kaspa-wasm-core.workspace = true
kaspa-wallet-core.workspace = true
kaspa-wallet-keys.workspace = true
kaspa-wrpc-client.workspace = true
kaspa-wrpc-wasm.workspace = true
num.workspace = true
wasm-bindgen.workspace = true
workflow-log.workspace = true
workflow-core.workspace = true
workflow-wasm.workspace = true

# getrandom 0.3 is pulled in transitively (ahash -> ark-crypto -> kaspa-txscript)
# and needs its `wasm_js` feature enabled on wasm32 (plus the getrandom_backend
# cfg in .cargo/config.toml). Declared in kaspa-utils too; also pinned here at the
# SDK build root so the feature unifies regardless of how the lock is regenerated.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }

[features]
wasm32-sdk = [
    "kaspa-wallet-core/wasm32-sdk",
    "kaspa-pow/wasm32-sdk",
    "kaspa-txscript/wasm32-sdk",
    "kaspa-txscript-zk-sdk/wasm32-sdk",
]
wasm32-core = [
    "kaspa-wallet-core/wasm32-core",
    "kaspa-pow/wasm32-sdk",
    "kaspa-txscript/wasm32-sdk",
    "kaspa-txscript-zk-sdk/wasm32-core",
]
wasm32-rpc = [
    "kaspa-consensus-core/wasm32-sdk",
    "kaspa-consensus-wasm/wasm32-sdk",
    "kaspa-wrpc-client/wasm32-sdk",
    "kaspa-wrpc-wasm/wasm32-sdk",
]
wasm32-keygen = []
default = []

[package.metadata.docs.rs]
targets = ["wasm32-unknown-unknown"]

[package.metadata.emanate.wasm]
targets = [
    { target = "nodejs", out-dir = "nodejs/kaspa" },
    { target = "web", out-dir = "web/kaspa" },
]
folder = "setup"

[package.metadata.wasm-pack.profile.release]
# The wasm is built as W3C MVP + reference-types (see the workspace
# .cargo/config.toml wasm32 rustflags); reference-types is required by
# wasm-bindgen's externref table, which `--weak-refs` relies on. wasm-opt must
# be told to allow reference-types (and bulk-memory, which -O may introduce)
# rather than validating against the MVP-only feature set.
wasm-opt = ["-O","--enable-bulk-memory","--enable-reference-types"]

[lints]
workspace = true

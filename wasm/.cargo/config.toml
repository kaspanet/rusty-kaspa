# Intentionally no rustflags here.
#
# The wasm32 rustflags (getrandom backend + `-Ctarget-cpu=mvp`
# `-Ctarget-feature=+reference-types`) are defined once in the workspace
# `.cargo/config.toml` under [target.wasm32-unknown-unknown]. A `[build]` or
# `[target.*]` rustflags entry here would shadow/override that single source
# (cargo does not merge rustflags across config files), so we deliberately keep
# this empty.
#
# In particular do NOT re-add `-Ctarget-cpu=mvp` alone: wasm-bindgen manages JS
# object handles via a reference-types externref table that `--weak-refs` needs,
# and dropping reference-types makes the wasm-bindgen CLI fail with
# `failed to find the __wbindgen_externref_table_alloc function`.
